name: Update FlixPatrol lists

on:
  schedule:
    # Daily at 05:00 UTC. FlixPatrol's daily charts are usually fresh by then.
    - cron: "0 5 * * *"
  workflow_dispatch:        # allow manual runs from the Actions tab

permissions:
  contents: write           # needed to commit generated files back

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python scraper.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lists/ cache.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: update FlixPatrol lists ($(date -u '+%Y-%m-%d %H:%MZ'))"
            git push
          fi
